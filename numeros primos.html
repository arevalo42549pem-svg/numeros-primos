<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Múltiplo de 3 y 5</title>
<style>
    body{
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg,#f6d365,#fda085);
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .contenedor{
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        width:380px;
        text-align:center;
        animation: aparecer 1s ease;
    }

    @keyframes aparecer{
        from{opacity:0; transform:scale(0.8);}
        to{opacity:1; transform:scale(1);}
    }

    h2{
        color:#d35400;
    }

    input{
        width:85%;
        padding:12px;
        margin:10px;
        border-radius:12px;
        border:1px solid #ccc;
        font-size:16px;
    }

    button{
        background: linear-gradient(90deg,#ff9966,#ff5e62);
        color:white;
        border:none;
        padding:12px 25px;
        border-radius:15px;
        cursor:pointer;
        font-size:16px;
        font-weight:bold;
    }

    button:hover{
        transform:scale(1.05);
    }

    #resultado{
        margin-top:20px;
        font-size:20px;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="contenedor">
    <h2>🔢 Múltiplo de 3 y 5</h2>

    <input type="number" id="numero" placeholder="Ingrese un número">

    <button onclick="verificar()">Verificar</button>

    <div id="resultado"></div>
</div>

<script>
function verificar(){
    let numero = parseInt(document.getElementById("numero").value);
    let resultado = document.getElementById("resultado");

    if(isNaN(numero)){
        resultado.innerHTML="⚠️ Ingrese un número";
        resultado.style.color="red";
        return;
    }

    if(numero % 3 == 0 && numero % 5 == 0){
        resultado.innerHTML="✅ Es múltiplo de 3 y 5";
        resultado.style.color="green";
    }else{
        resultado.innerHTML="❌ No es múltiplo de 3 y 5";
        resultado.style.color="blue";
    }
}
</script>

</body>
</html>
